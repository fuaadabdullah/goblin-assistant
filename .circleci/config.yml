version: 2.1

# ============================================================================
# Orbs
# ============================================================================
orbs:
  node: circleci/node@5.2.0
  python: circleci/python@2.1.1
  codecov: codecov/codecov@4.1.0

# ============================================================================
# Parameters
# ============================================================================
parameters:
  run_e2e_tests:
    type: boolean
    default: false
    description: "Run full Playwright E2E suite"

# ============================================================================
# Executors
# ============================================================================
executors:
  node-executor:
    docker:
      - image: cimg/node:20.9
    working_directory: ~/repo
    resource_class: medium

  python-executor:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/repo
    resource_class: medium

  node-python-executor:
    docker:
      - image: cimg/python:3.11-node
    working_directory: ~/repo
    resource_class: medium

  base-executor:
    docker:
      - image: cimg/base:current
    working_directory: ~/repo
    resource_class: medium

# ============================================================================
# Commands
# ============================================================================
commands:
  install-pnpm:
    description: "Install pnpm and Node dependencies"
    steps:
      - run:
          name: Enable corepack / pnpm
          command: |
            sudo npm install -g corepack
            corepack enable
            corepack prepare pnpm@9 --activate
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install Node deps
          command: TMPDIR=~/repo/.tmp pnpm install --frozen-lockfile=false
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store

  install-python:
    description: "Install Python API dependencies"
    steps:
      - restore_cache:
          keys:
            - python-v2-{{ checksum "apps/api/requirements.txt" }}-{{ checksum "apps/api/requirements-vector.txt" }}
            - python-v2-
      - run:
          name: Install Python deps
          command: |
            cd apps/api
            pip install --upgrade pip
            pip install -r requirements.txt -r requirements-vector.txt
      - save_cache:
          key: python-v2-{{ checksum "apps/api/requirements.txt" }}-{{ checksum "apps/api/requirements-vector.txt" }}
          paths:
            - ~/.cache/pip

  setup-tmpdir:
    steps:
      - run:
          name: Create .tmp directory
          command: mkdir -p ~/repo/.tmp

# ============================================================================
# Jobs
# ============================================================================
jobs:
  # --------------------------------------------------------------------------
  # Policy: branch + commit message conventions
  # --------------------------------------------------------------------------
  policy:
    executor: base-executor
    steps:
      - checkout
      - run:
          name: Enforce branch and commit policy
          command: |
            set -euo pipefail
            BRANCH_REGEX='^(feature|fix|refactor|infra)/'
            COMMIT_REGEX='^(feat|fix|refactor|infra|chore|docs|test|build|ci|perf|revert)(\([a-z0-9._/-]+\))?: .+'
            BRANCH="${CIRCLE_BRANCH}"
            # Only enforce branch naming on non-trunk branches (PRs)
            if [[ "$BRANCH" != "main" && "$BRANCH" != "develop" ]]; then
              if [[ ! "$BRANCH" =~ $BRANCH_REGEX ]]; then
                echo "Invalid branch '$BRANCH'. Expected: $BRANCH_REGEX"
                exit 1
              fi
            fi
            # Validate last commit message
            COMMIT_MSG=$(git log -1 --format="%s")
            if [[ ! "$COMMIT_MSG" =~ $COMMIT_REGEX ]]; then
              echo "Invalid commit message: '$COMMIT_MSG'"
              echo "Expected pattern: $COMMIT_REGEX"
              exit 1
            fi
            echo "Policy checks passed."

  # --------------------------------------------------------------------------
  # Format: ruff format (Python) + prettier (web)
  # --------------------------------------------------------------------------
  format-check:
    executor: node-python-executor
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Ruff format check
          command: cd apps/api && PYTHONPATH=src python -m ruff format --check src/api
      - run:
          name: Prettier check
          command: TMPDIR=~/repo/.tmp pnpm --filter @goblin/web exec prettier --check .

  # --------------------------------------------------------------------------
  # Security: secret scan + dependency audits
  # --------------------------------------------------------------------------
  security-scan:
    executor: node-python-executor
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - run:
          name: Install pip-audit
          command: pip install pip-audit
      - run:
          name: Scan for embedded secrets
          command: python scripts/security/scan_secrets.py
      - run:
          name: Audit npm dependencies
          command: TMPDIR=~/repo/.tmp pnpm --filter @goblin/web security:audit-ci
      - run:
          name: Audit Python dependencies
          command: python -m pip_audit -r apps/api/requirements.txt

  # --------------------------------------------------------------------------
  # Lint: ruff lint + eslint + policy guard
  # --------------------------------------------------------------------------
  lint:
    executor: node-python-executor
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Run all linters
          command: make lint

  # --------------------------------------------------------------------------
  # Type check: tsc + mypy + pyright + route lifecycle + sdk-check
  # --------------------------------------------------------------------------
  typecheck:
    executor: node-python-executor
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Install pyright
          command: pip install pyright
      - run:
          name: TypeScript type check
          command: TMPDIR=~/repo/.tmp pnpm --filter @goblin/web type-check
      - run:
          name: mypy
          command: make type-check-api-mypy
      - run:
          name: pyright
          command: make type-check-api-pyright
      - run:
          name: Route lifecycle policy
          command: make check-route-lifecycle
      - run:
          name: Verify SDK artifacts are current
          command: make sdk-check

  # --------------------------------------------------------------------------
  # Backend tests: pytest with coverage
  # --------------------------------------------------------------------------
  test-backend:
    executor: python-executor
    steps:
      - checkout
      - install-python
      - run:
          name: Run pytest
          command: |
            cd apps/api
            PYTHONPATH=src python -m pytest \
              -o "addopts=" \
              --cov=src/api \
              --cov-report=xml:coverage.xml \
              --cov-report=html:htmlcov \
              --junitxml=test-results.xml \
              --tb=short \
              -v
          environment:
            PYTHONPATH: src
      - store_test_results:
          path: apps/api/test-results.xml
      - store_artifacts:
          path: apps/api/htmlcov
          destination: coverage-html
      - codecov/upload:
          file: apps/api/coverage.xml
          flags: backend

  # --------------------------------------------------------------------------
  # Frontend tests: jest/vitest
  # --------------------------------------------------------------------------
  test-frontend:
    executor: node-executor
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - run:
          name: Run web tests
          command: TMPDIR=~/repo/.tmp pnpm --filter @goblin/web test:ci
      - store_artifacts:
          path: apps/web/coverage
          destination: web-coverage

  # --------------------------------------------------------------------------
  # Build: Next.js production build
  # --------------------------------------------------------------------------
  build:
    executor: node-python-executor
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Build web app
          command: TMPDIR=~/repo/.tmp make build
      - store_artifacts:
          path: apps/web/.next
          destination: next-build

  # --------------------------------------------------------------------------
  # Docker: build and push backend image
  # --------------------------------------------------------------------------
  docker-build:
    executor: base-executor
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build Docker image
          command: |
            SHORT_SHA="${CIRCLE_SHA1:0:7}"
            docker build \
              -t ghcr.io/${GITHUB_USER}/goblin-assistant:${CIRCLE_BRANCH}-${SHORT_SHA} \
              -t ghcr.io/${GITHUB_USER}/goblin-assistant:latest \
              -f Dockerfile .
      - run:
          name: Push to GHCR
          command: |
            SHORT_SHA="${CIRCLE_SHA1:0:7}"
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_USER" --password-stdin
            docker push ghcr.io/${GITHUB_USER}/goblin-assistant:${CIRCLE_BRANCH}-${SHORT_SHA}
            docker push ghcr.io/${GITHUB_USER}/goblin-assistant:latest

  # --------------------------------------------------------------------------
  # Deploy: trigger Render redeploy via API
  # --------------------------------------------------------------------------
  deploy-render:
    executor: base-executor
    steps:
      - run:
          name: Trigger Render deployment
          command: |
            curl -sf -X POST \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear_cache"}'
      - run:
          name: Wait for health check
          command: |
            echo "Waiting for Render to warm up..."
            sleep 60
            for i in $(seq 1 20); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                https://goblin-backend-dt30.onrender.com/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy after ${i} attempts."
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 15s..."
              sleep 15
            done
            echo "Backend health check failed after 5 minutes."
            exit 1

# ============================================================================
# Workflows
# ============================================================================
workflows:
  # Main CI/CD: runs on every push
  ci:
    jobs:
      - policy
      - format-check:
          requires: [policy]
      - security-scan:
          requires: [policy]
      - lint:
          requires: [format-check, security-scan]
      - typecheck:
          requires: [format-check, security-scan]
      - test-backend:
          requires: [lint, typecheck]
      - test-frontend:
          requires: [lint, typecheck]
      - build:
          requires: [test-backend, test-frontend]
      - docker-build:
          requires: [build]
          filters:
            branches:
              only: [main, develop]
      - deploy-render:
          requires: [docker-build]
          filters:
            branches:
              only: main

  # Nightly: full suite including optional E2E
  nightly:
    triggers:
      - schedule:
          cron: "0 3 * * *"
          filters:
            branches:
              only: main
    jobs:
      - test-backend
      - test-frontend
      - build
