[default]
timeout_ms = 12000

[default.scoring_weights]
latency = 0.4
cost = 0.3
reliability = 0.2
bandwidth = 0.1

[default.chain_of_thought_suppression]
suppress_for = ["summary", "code"]
force_for = ["reasoning"]

[default.cost_optimization]
max_budget_per_hour = 10.0
preferred_providers_under_budget = [
  "groq",
  "siliconeflow",
  "azure",
  "deepseek",
  "openai",
]

[providers.openai]
name = "OpenAI"
endpoint = "https://api.openai.com/v1"
invoke_path = "/chat/completions"
default_model = "gpt-4o-mini"
capabilities = ["chat", "reasoning", "code", "embedding", "image"]
models = ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]
api_key_env = "OPENAI_API_KEY"
priority_tier = 1
cost_score = 0.8
default_timeout_ms = 10000
bandwidth_score = 0.9
supports_cot = true
cot_suppression_prompt = "Answer directly without showing your reasoning."

[providers.anthropic]
name = "Anthropic"
endpoint = "https://api.anthropic.com"
invoke_path = "/v1/messages"
default_model = "claude-3-5-haiku-latest"
capabilities = ["chat", "reasoning", "code"]
models = ["claude-sonnet-4-20250514", "claude-3-5-haiku-latest"]
api_key_env = "ANTHROPIC_API_KEY"
priority_tier = 1
cost_score = 0.9
default_timeout_ms = 15000
bandwidth_score = 0.8
supports_cot = true
cot_suppression_prompt = "Be direct and concise."

[providers.gemini]
name = "Google Gemini"
endpoint = "https://generativelanguage.googleapis.com"
default_model = "gemini-2.0-flash"
capabilities = ["chat", "reasoning", "code", "image"]
models = ["gemini-2.0-flash", "gemini-2.0-flash-lite"]
api_key_env = "GOOGLE_AI_API_KEY"
priority_tier = 2
cost_score = 0.6
default_timeout_ms = 12000
bandwidth_score = 0.7
supports_cot = true
cot_suppression_prompt = "Provide direct answers without explanation."

[providers.deepseek]
name = "DeepSeek"
endpoint = "https://api.deepseek.com"
invoke_path = "/v1/chat/completions"
default_model = "deepseek-chat"
capabilities = ["chat", "reasoning", "code"]
models = ["deepseek-chat", "deepseek-coder"]
api_key_env = "DEEPSEEK_API_KEY"
priority_tier = 2
cost_score = 0.3
default_timeout_ms = 10000
bandwidth_score = 0.8
supports_cot = true
cot_suppression_prompt = "Answer concisely."

[providers.groq]
name = "Groq"
endpoint = "https://api.groq.com/openai/v1"
invoke_path = "/chat/completions"
default_model = "llama-3.1-8b-instant"
capabilities = ["chat", "reasoning", "code"]
models = ["llama-3.1-8b-instant", "llama-3.3-70b-versatile", "mixtral-8x7b-32768"]
api_key_env = "GROQ_API_KEY"
priority_tier = 2
cost_score = 0.4
default_timeout_ms = 8000
bandwidth_score = 0.95
supports_cot = true
cot_suppression_prompt = "Be direct."

[providers.siliconeflow]
name = "SiliconeFlow"
endpoint = "https://api.siliconflow.com"
invoke_path = "/v1/chat/completions"
default_model = "Qwen/Qwen2.5-7B-Instruct"
capabilities = ["chat", "reasoning", "code"]
models = ["Qwen/Qwen2.5-7B-Instruct", "Qwen/Qwen2.5-Coder-7B-Instruct", "deepseek-ai/DeepSeek-V2.5"]
api_key_env = "SILICONEFLOW_API_KEY"
priority_tier = 2
cost_score = 0.3
default_timeout_ms = 10000
bandwidth_score = 0.9
supports_cot = true
cot_suppression_prompt = "Be direct."

[providers.together]
name = "Together AI"
endpoint = "https://api.together.xyz"
capabilities = ["chat", "reasoning", "code", "image"]
models = ["llama-2-70b", "codellama-34b"]
api_key_env = "TOGETHER_API_KEY"
priority_tier = 3
cost_score = 0.5
default_timeout_ms = 10000
bandwidth_score = 0.8
