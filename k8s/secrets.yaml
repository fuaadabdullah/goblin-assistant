---
# Sandbox secrets (API keys, S3 credentials, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-secrets
  namespace: sandbox
  labels:
    app: sandbox
    component: secrets
type: Opaque
data:
  # API key for authentication (base64 encoded)
  # Default: 'devkey' - CHANGE THIS IN PRODUCTION
  api-key: ZGV2a2V5

  # S3/MinIO credentials
  # Default: 'goblin_sandbox' / 'goblin_sandbox_secret' - CHANGE THESE IN PRODUCTION
  s3-access-key: Z29ibGluX3NhbmRib3g=        # goblin_sandbox
  s3-secret-key: Z29ibGluX3NhbmRib3hfX3NlY3JldA==  # goblin_sandbox_secret

---
# Cosign public key for image verification (optional)
apiVersion: v1
kind: Secret
metadata:
  name: cosign-public-key
  namespace: sandbox
  labels:
    app: sandbox
    component: cosign
type: Opaque
data:
  # This should contain the base64-encoded cosign public key
  # Leave empty if not using image signature verification
  pubkey.pem: ""