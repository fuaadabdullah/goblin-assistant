---
# PRODUCTION SECRETS - CHANGE THESE IMMEDIATELY!
# These are SECURE production-ready secrets (examples only)

apiVersion: v1
kind: Secret
metadata:
  name: sandbox-secrets
  namespace: sandbox
  labels:
    app: sandbox
    component: secrets
    environment: production
type: Opaque
data:
  # Generate a strong API key: openssl rand -base64 32
  api-key: "U3VwZXJTZWNyZXRBU0lLZXlHZW5lcmF0ZWRGb3JQcm9kdWN0aW9uMTIzNDU2Nzg5MA=="

  # S3/MinIO credentials - Use AWS IAM or MinIO user
  s3-access-key: "c2FuZGJveC11c2Vy"        # sandbox-user
  s3-secret-key: "U3VwZXJTZWNyZXRNaW5JT1Bhc3N3b3JkRm9yU2FuZGJveCEh"  # SuperSecretMinIOPasswordForSandbox!!

---
# Certificate for attestation webhook
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: attestation-webhook-cert
  namespace: sandbox
spec:
  secretName: attestation-webhook-cert
  issuerRef:
    name: letsencrypt-prod  # Use Let's Encrypt in production
    kind: ClusterIssuer
  dnsNames:
  - sandbox.yourdomain.com
  - attestation-webhook.sandbox.svc.cluster.local

---
# External DNS configuration for production ingress
apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-config
  namespace: sandbox
data:
  # Production environment settings
  environment: "production"
  domain: "sandbox.yourdomain.com"
  tls-enabled: "true"

  # Monitoring endpoints
  prometheus-url: "https://prometheus.yourdomain.com"
  grafana-url: "https://grafana.yourdomain.com"
  alertmanager-url: "https://alertmanager.yourdomain.com"

  # Backup configuration
  backup-schedule: "0 2 * * *"  # Daily at 2 AM
  backup-retention-days: "30"
  backup-s3-bucket: "sandbox-backups-prod"