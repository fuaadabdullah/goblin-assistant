[tool:pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    --cov=.
    --cov-config=../.coveragerc
    --cov-report=html
    --cov-report=xml
    --cov-report=term-missing
asyncio_mode = auto
