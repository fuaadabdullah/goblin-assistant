schema-version: v1
rulesets:
  - python-best-practices
  - python-code-style
  - python-inclusive
  - python-pandas
  - python-security
  - tsx-react
  - typescript-best-practices
  - typescript-browser-security
  - typescript-code-style
  - typescript-common-security
  - typescript-inclusive
  - typescript-node-security
ignore-paths:
  - node_modules/
  - apps/web/.next/
  - apps/web/coverage/
  - apps/api/htmlcov/
  - apps/api/src/api/tests/
  - "**/__pycache__/"
  - "**/*.pyc"
  - dist/
  - build/
