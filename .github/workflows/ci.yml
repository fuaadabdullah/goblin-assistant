name: CI (GitHub-native gates)

# GitHub Actions handles only GitHub-native concerns.
# All heavy compute (format, lint, typecheck, tests, build, deploy)
# runs on CircleCI where it is not billing-constrained.

on:
  workflow_dispatch:
# Auto-push disabled: CircleCI handles all CI. GitHub Actions billing locked.
# Re-enable when billing is resolved:
#  push:
#    branches: [main, develop]
#  pull_request:
#    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Policy: branch-name + commit-message conventions (needs GitHub env vars)
  # ---------------------------------------------------------------------------
  policy:
    name: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce branch + commit policy
        run: bash tooling/automation/ci-policy-check.sh
