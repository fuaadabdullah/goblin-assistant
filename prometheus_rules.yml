groups:
  - name: sandbox_alerts
    rules:
      # Job failure rate alert (5% over 5 minutes)
      - alert: SandboxHighFailureRate
        expr: rate(sandbox_job_failures_total[5m]) / rate(sandbox_jobs_submitted_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: goblin-sandbox
        annotations:
          summary: "High sandbox job failure rate"
          description: "Sandbox job failure rate is {{ $value | printf \"%.2f\" }}% over the last 5 minutes (threshold: 5%)"
          runbook_url: "https://goblin-assistant.vercel.app/docs/sandbox/troubleshooting#high-failure-rate"

      # Queue depth alert
      - alert: SandboxQueueDepthHigh
        expr: sandbox_queue_depth > 50
        for: 2m
        labels:
          severity: warning
          service: goblin-sandbox
        annotations:
          summary: "Sandbox queue depth is high"
          description: "Sandbox queue depth is {{ $value }} jobs (threshold: 50)"
          runbook_url: "https://goblin-assistant.vercel.app/docs/sandbox/troubleshooting#queue-depth"

      # Job duration P95 alert (90% of 5min timeout = 4.5min)
      - alert: SandboxJobDurationHigh
        expr: histogram_quantile(0.95, rate(sandbox_job_duration_seconds_bucket[5m])) > 270
        for: 5m
        labels:
          severity: warning
          service: goblin-sandbox
        annotations:
          summary: "Sandbox job duration P95 is high"
          description: "95th percentile job duration is {{ $value | printf \"%.1f\" }}s over the last 5 minutes (threshold: 270s)"
          runbook_url: "https://goblin-assistant.vercel.app/docs/sandbox/troubleshooting#job-duration"

      # Container kills alert (indicates timeouts or resource issues)
      - alert: SandboxContainerKillsHigh
        expr: increase(sandbox_container_kills_total[10m]) > 5
        for: 5m
        labels:
          severity: warning
          service: goblin-sandbox
        annotations:
          summary: "High number of sandbox container kills"
          description: "{{ $value }} containers killed in the last 10 minutes (threshold: 5)"
          runbook_url: "https://goblin-assistant.vercel.app/docs/sandbox/troubleshooting#container-kills"

      # Artifact upload failures
      - alert: SandboxArtifactUploadFailures
        expr: rate(sandbox_artifacts_uploaded_total{result="failure"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: goblin-sandbox
        annotations:
          summary: "Sandbox artifact upload failures"
          description: "Artifact upload failure rate is {{ $value | printf \"%.2f\" }} over the last 5 minutes"
          runbook_url: "https://goblin-assistant.vercel.app/docs/sandbox/troubleshooting#artifact-uploads"

      # Cleanup service failures
      - alert: SandboxCleanupFailures
        expr: rate(sandbox_cleanup_runs_total{result="failure"}[1h]) > 0
        for: 15m
        labels:
          severity: warning
          service: goblin-sandbox
        annotations:
          summary: "Sandbox cleanup service failing"
          description: "Cleanup runs are failing - check artifact storage and permissions"
          runbook_url: "https://goblin-assistant.vercel.app/docs/sandbox/troubleshooting#cleanup-failures"

      # Running jobs stuck (no completion for extended period)
      - alert: SandboxJobsStuck
        expr: sandbox_jobs_running > 0 and (time() - max_over_time(timestamp(sandbox_jobs_running)[30m])) > 1800
        for: 10m
        labels:
          severity: critical
          service: goblin-sandbox
        annotations:
          summary: "Sandbox jobs appear stuck"
          description: "Jobs have been running for over 30 minutes without completion"
          runbook_url: "https://goblin-assistant.vercel.app/docs/sandbox/troubleshooting#stuck-jobs"

  - name: sandbox_slos
    rules:
      # Service Level Objectives
      - alert: SandboxAvailabilityLow
        expr: (1 - (rate(sandbox_job_failures_total[7d]) / rate(sandbox_jobs_submitted_total[7d]))) < 0.95
        for: 1h
        labels:
          severity: critical
          service: goblin-sandbox
          slo: availability
        annotations:
          summary: "Sandbox availability below SLO"
          description: "7-day success rate is {{ $value | printf \"%.1f\" }}% (SLO: 95%)"
          runbook_url: "https://goblin-assistant.vercel.app/docs/sandbox/slo#availability"

      - alert: SandboxLatencyHigh
        expr: histogram_quantile(0.95, rate(sandbox_job_duration_seconds_bucket[7d])) > 120
        for: 1h
        labels:
          severity: warning
          service: goblin-sandbox
          slo: latency
        annotations:
          summary: "Sandbox latency above SLO"
          description: "7-day P95 latency is {{ $value | printf \"%.1f\" }}s (SLO: 120s). Error budget: 2190 min/month."
          runbook_url: "https://goblin-assistant.vercel.app/docs/sandbox/slo#latency"
          response_time_expectation: "P95 job duration must stay below 120s over a 7-day window"

  - name: api_slos
    rules:
      # API Availability SLO: 99.9% — error budget 43.8 min/month
      - alert: APIAvailabilityLow
        expr: (1 - (rate(http_requests_total{status=~"5.."}[7d]) / rate(http_requests_total[7d]))) < 0.999
        for: 1h
        labels:
          severity: critical
          service: goblin-api
          slo: availability
        annotations:
          summary: "API availability below SLO (99.9%)"
          description: "7-day HTTP success rate is {{ $value | printf \"%.4f\" }} (SLO: 0.999). Error budget: 43.8 min/month — check /health for subsystem failures."
          runbook_url: "https://goblin-assistant.vercel.app/docs/operations/slo#api-availability-runbook"
          response_time_expectation: "Less than 0.1% of HTTP requests may return 5xx over a 7-day window"

      # Chat Latency SLO: P95 < 2s — latency budget, not error budget
      - alert: ChatLatencyHigh
        expr: histogram_quantile(0.95, rate(goblin_chat_duration_seconds_bucket[7d])) > 2
        for: 1h
        labels:
          severity: warning
          service: goblin-api
          slo: chat-latency
        annotations:
          summary: "Chat P95 latency above SLO (2s)"
          description: "7-day P95 chat duration is {{ $value | printf \"%.2f\" }}s (SLO: 2s). Check slow providers via /api/v1/health/routing."
          runbook_url: "https://goblin-assistant.vercel.app/docs/operations/slo#chat-latency-runbook"
          response_time_expectation: "95th percentile chat completion must be under 2 seconds over a 7-day window"

      # Auth Success Rate SLO: 99.9% — error budget 43.8 min/month
      - alert: AuthSuccessRateLow
        expr: (rate(auth_success_total[7d]) / rate(auth_attempts_total[7d])) < 0.999
        for: 1h
        labels:
          severity: critical
          service: goblin-api
          slo: auth-success-rate
        annotations:
          summary: "Auth success rate below SLO (99.9%)"
          description: "7-day auth success rate is {{ $value | printf \"%.4f\" }} (SLO: 0.999). Error budget: 43.8 min/month — check DB connectivity and CSRF config."
          runbook_url: "https://goblin-assistant.vercel.app/docs/operations/slo#auth-success-rate-runbook"
          response_time_expectation: "Less than 0.1% of authentication attempts may fail over a 7-day window"

      # LLM Provider Availability SLO: 99.5% — error budget 219 min/month
      - alert: LLMProviderAvailabilityLow
        expr: (rate(goblin_provider_requests_total{result="success"}[7d]) / rate(goblin_provider_requests_total[7d])) < 0.995
        for: 1h
        labels:
          severity: warning
          service: goblin-api
          slo: llm-availability
        annotations:
          summary: "LLM provider availability below SLO (99.5%)"
          description: "7-day provider success rate is {{ $value | printf \"%.4f\" }} (SLO: 0.995). Error budget: 219 min/month — check /api/v1/providers/status for circuit breaker state."
          runbook_url: "https://goblin-assistant.vercel.app/docs/operations/slo#llm-provider-availability-runbook"
          response_time_expectation: "Less than 0.5% of LLM provider requests may fail over a 7-day window"