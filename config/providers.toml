# =============================================================================
# Goblin Assistant — SINGLE source of truth for all provider & system config
# =============================================================================
# Consumers:
#   - Python backend: apps/api/src/api/providers/dispatcher.py
#   - Python monitoring: apps/api/src/api/config/providers.py
#   - Python budget: apps/api/src/api/services/context_assembly_service/budget_manager.py
#   - TS frontend: apps/web/src/services/provider-router.ts  (via generated providers.json)
#   - RAPTOR router: apps/api/src/api/raptor_router.py
# =============================================================================

# ---------------------------------------------------------------------------
# Visible provider IDs  —  order controls UI / API listing order
# ---------------------------------------------------------------------------
visible_providers = [
  "groq",
  "deepseek",
  "gemini",
  "siliconeflow",
  "openai",
  "azure_openai",
  "anthropic",
  "together",
  "replicate",
  "cohere",
  "huggingface",
  "aliyun",
  "gcp_vllm",
  "gcp_vm",
]

[default]
timeout_ms = 12000

[default.scoring_weights]
latency = 0.4
cost = 0.3
reliability = 0.2
bandwidth = 0.1

[default.chain_of_thought_suppression]
suppress_for = ["summary", "code"]
force_for = ["reasoning"]

[default.cost_optimization]
max_budget_per_hour = 10.0
preferred_providers_under_budget = [
  "groq",
  "siliconeflow",
  "azure",
  "deepseek",
  "openai",
]

[default.health]
health_check_interval = 30
timeout_seconds = 10
retry_attempts = 3

# ---------------------------------------------------------------------------
# RAPTOR profiler / sampler settings
# ---------------------------------------------------------------------------
[default.raptor]
level = "INFO"
file = "logs/raptor.log"
enable_cpu = true
enable_memory = true
sample_rate_ms = 200
trace_exceptions = true
enable_dev_flags = false

# ---------------------------------------------------------------------------
# Load-balancing & failover
# ---------------------------------------------------------------------------
[load_balancing]
enabled = true
strategy = "round_robin"
health_check_interval = 30
failure_threshold = 3
recovery_threshold = 2
failover_to_backup = true
max_failover_time = 60
circuit_breaker_enabled = true
circuit_breaker_failure_threshold = 3
circuit_breaker_recovery_timeout = 30

[load_balancing.health_checks]
ollama_health = "/api/tags"
router_health = "/health"
timeout_seconds = 10

[load_balancing.server_priorities]
primary_ollama = "192.175.23.150:8002"
backup_router = "45.61.51.220:8000"

