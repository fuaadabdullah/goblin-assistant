"qwen-local"                          = { provider = "ollama_local",  model = "qwen2.5:3b" }

# ---------------------------------------------------------------------------
# Visible provider IDs  —  order controls UI / API listing order
# ---------------------------------------------------------------------------
visible_providers = [
  "openai",
  "anthropic",
  "groq",
  "siliconeflow",
  "deepseek",
  "gemini",
  "azure_openai",
  "vertex_ai",
  "aliyun",
  "huggingface",
  "ollama_gcp",
  "llamacpp_gcp",
  "ollama_local",
]

