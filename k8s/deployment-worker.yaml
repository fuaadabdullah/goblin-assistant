apiVersion: apps/v1
kind: Deployment
metadata:
  name: goblin-assistant-worker
  namespace: sandbox
  labels:
    app: goblin-assistant-worker
    component: worker
spec:
  replicas: 1  # Start with 1, scale based on queue depth
  selector:
    matchLabels:
      app: goblin-assistant-worker
  template:
    metadata:
      labels:
        app: goblin-assistant-worker
        component: worker
    spec:
      # Service account with Docker access permissions
      serviceAccountName: sandbox-worker-sa

      # Security context for the pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # Allow Docker socket access for container execution
      hostNetwork: false  # Explicitly disable host networking
      hostIPC: false      # Disable host IPC
      hostPID: false      # Disable host PID

      containers:
      - name: worker
        image: goblin-assistant-sandbox:latest
        imagePullPolicy: Always
        command: ["rq", "worker", "sandbox-jobs", "--loglevel=info"]

        # Security context for the container
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Workers need to write artifacts
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault

        # Resource limits (higher for sandbox execution)
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"    # Allow burst capacity for compilation
            memory: "1Gi"    # Higher memory for sandbox processes

        # Environment variables
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        - name: SANDBOX_IMAGE
          value: "goblin-assistant-sandbox:latest"
        - name: MAX_JOB_MEMORY
          value: "256m"
        - name: MAX_JOB_CPUS
          value: "0.5"
        - name: JOB_TIMEOUT_SECONDS
          value: "300"  # 5 minutes max per job
        - name: ARTIFACT_S3_ENDPOINT
          value: "http://minio-service:9000"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: sandbox-secrets
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: sandbox-secrets
              key: s3-secret-key
        - name: S3_BUCKET
          value: "goblin-sandbox"
        - name: S3_REGION
          value: "us-east-1"
        - name: MAX_ARTIFACT_SIZE_MB
          value: "10"
        - name: ARTIFACT_TTL_DAYS
          value: "7"

        # Volume mounts
        volumeMounts:
        - name: docker-socket
          mountPath: /var/run/docker.sock
          readOnly: true
        - name: job-storage
          mountPath: /work
        - name: tmp-volume
          mountPath: /tmp

      # Init container for image verification (cosign)
      initContainers:
      - name: verify-sandbox-image
        image: cgr.dev/chainguard/cosign:latest
        command:
        - sh
        - -c
        - |
          echo "Verifying sandbox image signature..."
          cosign verify --key /etc/cosign/pubkey.pem goblin-assistant-sandbox:latest || exit 1
          echo "✅ Image signature verified"
        volumeMounts:
        - name: cosign-key
          mountPath: /etc/cosign
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

      # Volumes
      volumes:
      - name: docker-socket
        hostPath:
          path: /var/run/docker.sock
          type: Socket
      - name: job-storage
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi  # Temporary job storage
      - name: tmp-volume
        emptyDir:
          medium: Memory
          sizeLimit: 32Mi
      - name: cosign-key
        secret:
          secretName: cosign-public-key
          optional: true  # Allow deployment without signature verification

      # Node affinity - prefer nodes with Docker/runtime
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: docker-runtime
                operator: In
                values:
                - "available"
          - weight: 50
            preference:
              matchExpressions:
              - key: sandbox-enabled
                operator: In
                values:
                - "true"

      # Tolerations
      tolerations:
      - key: "sandbox"
        operator: "Equal"
        value: "enabled"
        effect: "NoSchedule"
      - key: "docker"
        operator: "Equal"
        value: "required"
        effect: "NoSchedule"

      # Pod disruption budget considerations
      terminationGracePeriodSeconds: 300  # Allow 5 minutes for graceful shutdown