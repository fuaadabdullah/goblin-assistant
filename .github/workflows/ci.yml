name: Goblin Assistant CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/goblin-assistant/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/goblin-assistant/**'
      - '.github/workflows/ci.yml'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

jobs:
  # ------------------------------------------------------------------------------
  # Code Quality & Linting
  # ------------------------------------------------------------------------------
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/goblin-assistant/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/goblin-assistant
          npm ci

      - name: Verify frontend toolchain binaries
        run: |
          cd apps/goblin-assistant
          npx next --version
          node -e "require.resolve('next/package.json'); console.log('next dependency resolved')"

      - name: Run ESLint
        run: |
          cd apps/goblin-assistant
          npm run lint

      - name: Run TypeScript type check
        run: |
          cd apps/goblin-assistant
          npm run type-check

      - name: Check formatting
        run: |
          cd apps/goblin-assistant
          npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,md}"

  # ------------------------------------------------------------------------------
  # Backend Testing
  # ------------------------------------------------------------------------------
  backend-test:
    name: Backend Tests (Python/pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd apps/goblin-assistant/api
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests with coverage
        run: |
          cd apps/goblin-assistant/api
          python -m pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/goblin-assistant/api/coverage.xml
          flags: backend
          name: goblin-assistant-backend
          fail_ci_if_error: false

  # ------------------------------------------------------------------------------
  # Frontend Testing
  # ------------------------------------------------------------------------------
  test:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/goblin-assistant/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/goblin-assistant
          npm ci

      - name: Run tests with coverage
        run: |
          cd apps/goblin-assistant
          npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./apps/goblin-assistant/coverage/lcov.info
          flags: frontend
          name: goblin-assistant-frontend
          fail_ci_if_error: false

  # ------------------------------------------------------------------------------
  # Build & Bundle Analysis
  # ------------------------------------------------------------------------------
  build:
    name: Build & Bundle Analysis
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/goblin-assistant/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/goblin-assistant
          npm ci

      - name: Build application
        run: |
          cd apps/goblin-assistant
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goblin-assistant-build
          path: apps/goblin-assistant/dist/
          retention-days: 7

  # ------------------------------------------------------------------------------
  # Security & Vulnerability Scanning
  # ------------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/goblin-assistant/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/goblin-assistant
          npm ci

      - name: Run npm audit
        run: |
          cd apps/goblin-assistant
          npm run security:audit

      - name: Run security audit with audit-ci
        run: |
          cd apps/goblin-assistant
          npm run security:audit-ci

  # ------------------------------------------------------------------------------
  # E2E Testing (if applicable)
  # ------------------------------------------------------------------------------
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/goblin-assistant/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/goblin-assistant
          npm ci

      - name: Install Playwright browsers
        run: |
          cd apps/goblin-assistant
          npx playwright install --with-deps

      - name: Run E2E tests
        run: |
          cd apps/goblin-assistant
          npm run test:e2e

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: apps/goblin-assistant/playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------------------
  # Quality Gate Check
  # ------------------------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test, build, security-scan, e2e-test]
    if: always()
    steps:
      - name: Check all quality gates
        run: |
          echo "🔍 Checking quality gates..."

          # Check linting
          if [[ "${{ needs.lint-and-type-check.result }}" != "success" ]]; then
            echo "❌ Linting/Type checking failed"
            exit 1
          fi

          # Check tests
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi

          # Check build
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build failed"
            exit 1
          fi

          # Check security (allow warnings)
          if [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "❌ Security scan failed"
            exit 1
          fi

          echo "✅ All quality gates passed!"
          echo ""
          echo "📊 CI Summary:"
          echo "  - ✅ Code linting and type checking"
          echo "  - ✅ Unit tests with coverage"
          echo "  - ✅ Application build"
          echo "  - ✅ Security vulnerability scan"
          echo "  - ✅ E2E tests (if applicable)"

  # ------------------------------------------------------------------------------
  # Deployment
  # ------------------------------------------------------------------------------
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.event_name == 'pull_request' && needs.quality-gate.result == 'success'
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate Vercel configuration
        run: |
          if [[ -z "${{ secrets.VERCEL_TOKEN }}" ]]; then
            echo "❌ Missing required secret: VERCEL_TOKEN"
            exit 1
          fi
          if [[ -z "${{ env.VERCEL_ORG_ID }}" || -z "${{ env.VERCEL_PROJECT_ID }}" ]]; then
            echo "❌ Missing required repository variables: VERCEL_ORG_ID and/or VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy preview to Vercel
        id: deploy_preview
        run: |
          cd apps/goblin-assistant
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          PREVIEW_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "✅ Preview deployment ready"
          echo "Preview URL: ${PREVIEW_URL}"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- goblin-assistant-preview-url -->';
            const previewUrl = `${{ steps.deploy_preview.outputs.preview_url }}`;
            const body = `${marker}\n🚀 **Preview deployment is ready**\n\n🔗 ${previewUrl}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.quality-gate.result == 'success'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate Vercel configuration
        run: |
          if [[ -z "${{ secrets.VERCEL_TOKEN }}" ]]; then
            echo "❌ Missing required secret: VERCEL_TOKEN"
            exit 1
          fi
          if [[ -z "${{ env.VERCEL_ORG_ID }}" || -z "${{ env.VERCEL_PROJECT_ID }}" ]]; then
            echo "❌ Missing required repository variables: VERCEL_ORG_ID and/or VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy production to Vercel
        run: |
          cd apps/goblin-assistant
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          PROD_URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "✅ Production deployment completed"
          echo "Production URL: ${PROD_URL}"
