# Docker Compose override for external GOBLINOS drive storage.
# Usage: docker compose -f docker-compose.yml -f docker-compose.goblinos-override.yml up
#
# Redirects persistent data volumes to the external GOBLINOS 1 drive so they
# survive container rebuilds without consuming the internal disk.

services:
  redis:
    volumes:
      - /Volumes/GOBLINOS\ 1/goblin-assistant/redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
