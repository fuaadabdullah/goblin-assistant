version: 2.1

# No orbs — uses only official Docker images and shell steps.
# Orb security settings can be enabled later in CircleCI Org Settings → Security.

parameters:
  run_e2e_tests:
    type: boolean
    default: false

executors:
  node:
    docker:
      - image: cimg/node:20.9
    working_directory: ~/repo
    resource_class: medium

  python:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/repo
    resource_class: medium

  node-python:
    docker:
      - image: cimg/python:3.11-node
    working_directory: ~/repo
    resource_class: medium

  base:
    docker:
      - image: cimg/base:current
    working_directory: ~/repo
    resource_class: medium

commands:
  trigger-autofix:
    steps:
      - run:
          name: AI autofix via Claude (on failure)
          when: on_fail
          command: |
            pip install --quiet anthropic
            FAILURE_OUTPUT_FILE=/tmp/ci_failure_output.txt \
              python3 tooling/automation/ci_autofix_trigger.py

  setup-tmpdir:
    steps:
      - run:
          name: Create .tmp directory
          command: mkdir -p ~/repo/.tmp

  install-pnpm:
    steps:
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm@9
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install Node deps
          command: TMPDIR=~/repo/.tmp pnpm install --frozen-lockfile=false
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store

  install-python:
    steps:
      - restore_cache:
          keys:
            - pip-v1-{{ checksum "apps/api/requirements.txt" }}-{{ checksum "apps/api/requirements-vector.txt" }}
            - pip-v1-
      - run:
          name: Install Python deps
          command: |
            pip install --upgrade pip
            pip install -r apps/api/requirements.txt -r apps/api/requirements-vector.txt
      - save_cache:
          key: pip-v1-{{ checksum "apps/api/requirements.txt" }}-{{ checksum "apps/api/requirements-vector.txt" }}
          paths:
            - ~/.cache/pip

jobs:
  # ── Policy ───────────────────────────────────────────────────────────────
  policy:
    executor: base
    steps:
      - checkout
      - run:
          name: Branch + commit policy
          command: bash tooling/automation/ci-policy-check.sh

  # ── Format ───────────────────────────────────────────────────────────────
  format-check:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Ruff format check
          command: cd apps/api && PYTHONPATH=src python -m ruff format --check src/api
      - run:
          name: Prettier check
          command: cd apps/web && TMPDIR=~/repo/.tmp pnpm exec prettier --check .

  # ── Security ─────────────────────────────────────────────────────────────
  security-scan:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - run:
          name: Install pip-audit
          command: pip install pip-audit
      - run:
          name: Secret scan
          command: python scripts/security/scan_secrets.py
      - run:
          name: Audit npm deps
          command: npx audit-ci --config audit-ci.json
      - run:
          name: Audit Python deps
          command: python -m pip_audit -r apps/api/requirements.txt

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Lint (ruff + eslint + policy guard)
          command: make lint 2>&1 | tee /tmp/ci_failure_output.txt; exit ${PIPESTATUS[0]}
      - trigger-autofix

  # ── Type check ───────────────────────────────────────────────────────────
  typecheck:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Install pyright
          command: pip install pyright
      - run:
          name: TypeScript
          command: TMPDIR=~/repo/.tmp pnpm --filter @goblin/web type-check
      - run:
          name: mypy
          command: make type-check-api-mypy
      - run:
          name: pyright
          command: make type-check-api-pyright
      - run:
          name: Route lifecycle policy
          command: make check-route-lifecycle
      - run:
          name: SDK artifacts current
          command: make sdk-check
      - run:
          name: Providers JSON current
          command: make check-providers-json
      - trigger-autofix

  # ── Backend tests ─────────────────────────────────────────────────────────
  test-backend:
    executor: python
    steps:
      - checkout
      - setup-tmpdir
      - install-python
      - run:
          name: pytest with coverage
          command: |
            pip install pytest-cov
            cd apps/api
            PYTHONPATH=src python -m pytest \
              -o "addopts=" \
              --cov=src/api \
              --cov-report=xml:coverage.xml \
              --cov-report=html:htmlcov \
              --cov-fail-under=60 \
              --junitxml=test-results.xml \
              --tb=short -v 2>&1 | tee /tmp/ci_failure_output.txt; exit ${PIPESTATUS[0]}
      - run:
          name: Contract tests
          command: |
            cd apps/api
            PYTHONPATH=src python -m pytest \
              -o "addopts=" \
              src/api/tests/test_contract_boundaries.py \
              src/api/tests/test_chat_route_version_aliases.py \
              --tb=short -v 2>&1 | tee -a /tmp/ci_failure_output.txt; exit ${PIPESTATUS[0]}
      - trigger-autofix
      - store_test_results:
          path: apps/api/test-results.xml
      - store_artifacts:
          path: apps/api/htmlcov
          destination: coverage-html
      - run:
          name: Upload to Codecov
          command: |
            if [ -z "$CODECOV_TOKEN" ]; then
              echo "Warning: CODECOV_TOKEN not set, skipping Codecov upload"
              exit 0
            fi
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov -t "${CODECOV_TOKEN}" -f apps/api/coverage.xml -F backend

  # ── Frontend tests ────────────────────────────────────────────────────────
  test-frontend:
    executor: node
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - run:
          name: Web tests
          command: TMPDIR=~/repo/.tmp pnpm --filter @goblin/web test:ci 2>&1 | tee /tmp/ci_failure_output.txt; exit ${PIPESTATUS[0]}
      - trigger-autofix
      - store_artifacts:
          path: apps/web/coverage
          destination: web-coverage
      - run:
          name: Upload frontend coverage to Codecov
          command: |
            if [ -z "$CODECOV_TOKEN" ]; then
              echo "Warning: CODECOV_TOKEN not set, skipping Codecov upload"
              exit 0
            fi
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov -t "${CODECOV_TOKEN}" -f apps/web/coverage/coverage-final.json -F frontend
      - run:
          name: E2E budget check (max 8 critical journeys)
          command: make test-e2e-budget

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Next.js production build
          command: TMPDIR=~/repo/.tmp make build
      - store_artifacts:
          path: apps/web/.next
          destination: next-build

  # ── Docker ────────────────────────────────────────────────────────────────
  docker-build:
    executor: base
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Validate Docker credentials
          command: |
            if [ -z "$GITHUB_USER" ] || [ -z "$GITHUB_TOKEN" ]; then
              echo "Error: GITHUB_USER or GITHUB_TOKEN not set"
              echo "Set these in CircleCI project settings → Environment Variables"
              exit 1
            fi
      - run:
          name: Build and push Docker image
          command: |
            SHORT="${CIRCLE_SHA1:0:7}"
            TAG="ghcr.io/${GITHUB_USER}/goblin-assistant:${CIRCLE_BRANCH}-${SHORT}"
            docker build -t "$TAG" -t "ghcr.io/${GITHUB_USER}/goblin-assistant:latest" -f Dockerfile .
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_USER" --password-stdin
            docker push "$TAG"
            docker push "ghcr.io/${GITHUB_USER}/goblin-assistant:latest"

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy-render:
    executor: base
    steps:
      - run:
          name: Validate Render credentials
          command: |
            if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ]; then
              echo "Error: RENDER_SERVICE_ID or RENDER_API_KEY not set"
              echo "Set these in CircleCI project settings → Environment Variables"
              exit 1
            fi
      - run:
          name: Trigger Render deploy
          command: |
            curl -sf -X POST \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}'
      - run:
          name: Wait for health check
          command: |
            sleep 60
            for i in $(seq 1 20); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                https://goblin-backend-dt30.onrender.com/health || echo "000")
              [ "$STATUS" = "200" ] && echo "Healthy after $i attempts." && exit 0
              echo "Attempt $i: $STATUS — retrying in 15s"
              sleep 15
            done
            echo "Health check timed out." && exit 1

  # ── Lighthouse CI ────────────────────────────────────────────────────────
  lighthouse-ci:
    docker:
      - image: cimg/node:20.9-browsers
    working_directory: ~/repo
    resource_class: medium
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - run:
          name: Build Next.js for Lighthouse
          command: TMPDIR=~/repo/.tmp make build
      - run:
          name: Run Lighthouse CI
          command: |
            cd apps/web
            TMPDIR=~/repo/.tmp pnpm lhci autorun
          environment:
            LHCI_BUILD_CONTEXT__CURRENT_HASH: << pipeline.git.revision >>
            LHCI_BUILD_CONTEXT__COMMIT_TIME: << pipeline.git.base_revision >>
      - store_artifacts:
          path: apps/web/.lighthouseci
          destination: lighthouse-reports

  # ── Chromatic (visual regression) ────────────────────────────────────────
  chromatic:
    executor: node
    working_directory: ~/repo
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - run:
          name: Publish to Chromatic
          command: |
            cd apps/web
            if [ -z "$CHROMATIC_PROJECT_TOKEN" ]; then
              echo "CHROMATIC_PROJECT_TOKEN not set — skipping visual regression."
              echo "Add the token from chromatic.com/manage to CircleCI env vars to enable."
              exit 0
            fi
            # On main, auto-accept so baseline advances without manual review.
            # On all other branches, upload and flag diffs for async review —
            # exit-zero-on-changes keeps the build green while visual review
            # happens in the Chromatic UI.
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              TMPDIR=~/repo/.tmp pnpm chromatic --auto-accept-changes
            else
              TMPDIR=~/repo/.tmp pnpm chromatic --exit-zero-on-changes
            fi
          environment:
            CHROMATIC_PROJECT_TOKEN: $CHROMATIC_PROJECT_TOKEN

  # ── Vercel (frontend) ────────────────────────────────────────────────────
  deploy-vercel:
    executor: node
    steps:
      - checkout
      - setup-tmpdir
      - run:
          name: Validate Vercel credentials
          command: |
            if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
              echo "Error: VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID not set"
              echo "Set these in CircleCI project settings → Environment Variables"
              exit 1
            fi
      - run:
          name: Install Vercel CLI
          command: TMPDIR=~/repo/.tmp pnpm add -g vercel
      - run:
          name: Deploy to Vercel (production)
          command: |
            vercel pull --yes --environment=production --token=$VERCEL_TOKEN
            vercel build --prod --token=$VERCEL_TOKEN
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
            echo "Deployed: $DEPLOY_URL"
          environment:
            VERCEL_ORG_ID: $VERCEL_ORG_ID
            VERCEL_PROJECT_ID: $VERCEL_PROJECT_ID

  # ── Notify ────────────────────────────────────────────────────────────────
  notify-deploy:
    executor: base
    steps:
      - run:
          name: Notify Slack
          when: always
          command: |
            if [ -z "$SLACK_WEBHOOK_URL" ]; then
              echo "SLACK_WEBHOOK_URL not set — skipping notification."
              exit 0
            fi
            SHORT="${CIRCLE_SHA1:0:7}"
            MSG="${CIRCLE_WORKFLOW_JOB_ID:+✅ Goblin deployed to production}"
            MSG="${MSG:-❌ Goblin deployment FAILED}"
            curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"$MSG\",
                \"blocks\": [{
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*$MSG*\nCommit: \`$SHORT\` on \`$CIRCLE_BRANCH\`\nAPI: https://goblin-backend-dt30.onrender.com\nFrontend: https://goblin-assistant.vercel.app\n<$CIRCLE_BUILD_URL|View build>\"
                  }
                }]
              }"

  # ── Smoke Tests ──────────────────────────────────────────────────────────
  smoke-test:
    executor: base
    steps:
      - run:
          name: Health check
          command: |
            for i in $(seq 1 5); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                https://goblin-backend-dt30.onrender.com/health || echo "000")
              [ "$STATUS" = "200" ] && echo "Health check passed." && break
              echo "Attempt $i: $STATUS — retrying in 10s"
              sleep 10
              [ "$i" = "5" ] && echo "Health check failed after 5 attempts." && exit 1
            done
      - run:
          name: Readiness check
          command: |
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              https://goblin-backend-dt30.onrender.com/health/ready || echo "000")
            [ "$STATUS" = "200" ] && echo "Readiness check passed." && exit 0
            echo "Readiness check returned $STATUS." && exit 1

workflows:
  ci:
    jobs:
      - policy
      - format-check:
          requires: [policy]
      - security-scan:
          requires: [policy]
      - lint:
          requires: [format-check, security-scan]
      - typecheck:
          requires: [format-check, security-scan]
      - test-backend:
          requires: [lint, typecheck]
      - test-frontend:
          requires: [lint, typecheck]
      - build:
          requires: [test-backend, test-frontend]
      - chromatic:
          requires: [lint, typecheck]
      - lighthouse-ci:
          requires: [build]
          filters:
            branches:
              only: [main, develop]
      - docker-build:
          requires: [build]
          filters:
            branches:
              only: [main, develop]
      - deploy-render:
          requires: [docker-build]
          filters:
            branches:
              only: main
      - deploy-vercel:
          requires: [build]
          filters:
            branches:
              only: main
      - smoke-test:
          requires: [deploy-render]
          filters:
            branches:
              only: main
      - notify-deploy:
          requires: [smoke-test, deploy-vercel]
          filters:
            branches:
              only: main

  nightly:
    triggers:
      - schedule:
          cron: "0 3 * * *"
          filters:
            branches:
              only: main
    jobs:
      - security-scan
      - test-backend
      - test-frontend
      - build
      - chromatic:
          requires: [build]
      - lighthouse-ci:
          requires: [build]
      - smoke-test
