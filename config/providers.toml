# =============================================================================
# Goblin Assistant — SINGLE source of truth for all provider & system config
# =============================================================================
# Consumers:
#   - Python backend: apps/api/src/api/providers/dispatcher.py
#   - Python monitoring: apps/api/src/api/config/providers.py
#   - Python budget: apps/api/src/api/services/context_assembly_service/budget_manager.py
#   - TS frontend: apps/web/src/services/provider-router.ts  (via generated providers.json)
#   - RAPTOR router: apps/api/src/api/raptor_router.py
# =============================================================================

[default]
timeout_ms = 12000

[default.scoring_weights]
latency = 0.4
cost = 0.3
reliability = 0.2
bandwidth = 0.1

[default.chain_of_thought_suppression]
suppress_for = ["summary", "code"]
force_for = ["reasoning"]

[default.cost_optimization]
max_budget_per_hour = 10.0
preferred_providers_under_budget = [
  "groq",
  "siliconeflow",
  "azure",
  "deepseek",
  "openai",
]

[default.health]
health_check_interval = 60
timeout_seconds = 10
retry_attempts = 3

# ---------------------------------------------------------------------------
# RAPTOR profiler / sampler settings
# ---------------------------------------------------------------------------
[default.raptor]
level = "INFO"
file = "logs/raptor.log"
enable_cpu = true
enable_memory = true
sample_rate_ms = 200
trace_exceptions = true
enable_dev_flags = false

# ---------------------------------------------------------------------------
# Load-balancing & failover
# ---------------------------------------------------------------------------
[load_balancing]
enabled = true
strategy = "round_robin"
health_check_interval = 30
failure_threshold = 3
recovery_threshold = 2
failover_to_backup = true
max_failover_time = 60
circuit_breaker_enabled = true

[load_balancing.health_checks]
ollama_health = "/api/tags"
router_health = "/health"
timeout_seconds = 10

[load_balancing.server_priorities]
primary_ollama = "192.175.23.150:8002"
backup_router = "45.61.51.220:8000"

# ---------------------------------------------------------------------------
# Provider aliases  —  any of these strings resolve to the canonical ID below
# ---------------------------------------------------------------------------
[provider_aliases]
azure                    = "azure_openai"
azure_openai             = "azure_openai"
azure-openai             = "azure_openai"
vertex                   = "vertex_ai"
vertex-ai                = "vertex_ai"
google                   = "gemini"
siliconflow              = "siliconeflow"
silicon_flow             = "siliconeflow"
silicone-flow            = "siliconeflow"
silicone_flow            = "siliconeflow"
ollama                   = "ollama_local"
ollama-local             = "ollama_local"
ollama-gcp               = "ollama_gcp"
llamacpp                 = "llamacpp_gcp"
llama_cpp                = "llamacpp_gcp"
llamacpp-gcp             = "llamacpp_gcp"

# ---------------------------------------------------------------------------
# Model aliases  —  short name → { provider, model }
# ---------------------------------------------------------------------------
[model_aliases]
"gpt-4o"                              = { provider = "openai",        model = "gpt-4o" }
"gpt-4o-mini"                         = { provider = "openai",        model = "gpt-4o-mini" }
"claude-haiku"                        = { provider = "anthropic",     model = "claude-3-5-haiku-latest" }
"claude-sonnet"                       = { provider = "anthropic",     model = "claude-sonnet-4-20250514" }
"qwen-max"                            = { provider = "aliyun",        model = "qwen-max" }
"qwen-plus"                           = { provider = "aliyun",        model = "qwen-plus" }
"qwen-7b"                             = { provider = "siliconeflow",  model = "Qwen/Qwen2.5-7B-Instruct" }
"qwen-coder"                          = { provider = "siliconeflow",  model = "Qwen/Qwen2.5-Coder-7B-Instruct" }
"deepseek-chat"                       = { provider = "deepseek",      model = "deepseek-chat" }
"gemini-flash"                        = { provider = "gemini",        model = "gemini-2.0-flash" }
