name: Terraform Plan & Validate

on:
  workflow_dispatch:
# Auto-push disabled: GitHub Actions billing locked.
# Re-enable when billing is resolved:
#  push:
#    branches: [main, develop]
#    paths:
#      - 'terraform/**'
#      - 'terraform.tfvars.example'
#      - '.github/workflows/terraform-plan.yml'
#  pull_request:
#    branches: [main, develop]
#    paths:
#      - 'terraform/**'
#      - 'terraform.tfvars.example'

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: '1.6.0'

jobs:
  # ==============================================================================
  # Terraform Format Check
  # ==============================================================================
  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check Terraform formatting
        run: |
          cd terraform
          terraform fmt -check -recursive

  # ==============================================================================
  # Terraform Validation
  # ==============================================================================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [terraform-fmt]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Initialize Terraform
        run: |
          cd terraform
          terraform init -backend=false
        env:
          TF_INPUT: false

      - name: Validate Terraform configuration
        run: |
          cd terraform
          terraform validate

      - name: Check for security issues with tfsec
        run: |
          # Install tfsec
          wget -qO /tmp/tfsec https://github.com/aquasecurity/tfsec/releases/download/v1.28.1/tfsec-linux-amd64
          chmod +x /tmp/tfsec
          /tmp/tfsec terraform/ -f sarif > tfsec-results.sarif || true

  # ==============================================================================
  # Terraform Plan (for PR changes)
  # ==============================================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Initialize Terraform
        run: |
          cd terraform
          terraform init -backend=false
        env:
          TF_INPUT: false

      - name: Create terraform.tfvars for plan
        run: |
          cd terraform
          # Create a minimal tfvars for planning (use example values)
          cat > terraform.tfvars << 'EOF'
          render_api_key = "dummy_key_for_plan"
          github_token = "dummy_token_for_plan"
          github_owner = "fuaadabdullah"
          github_repo = "goblin-assistant"
          environment = "production"
          EOF

      - name: Generate Terraform plan
        id: plan
        run: |
          cd terraform
          terraform plan -no-color -out=tfplan || true
        env:
          TF_INPUT: false

      - name: Format plan output
        id: fmt-plan
        run: |
          cd terraform
          terraform show -no-color tfplan > plan.txt
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          cat plan.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR with plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const plan = `${{ steps.fmt-plan.outputs.plan_output }}`;
            
            const comment = `## 📋 Terraform Plan
            
            \`\`\`
            ${plan.substring(0, 30000)}
            \`\`\`
            
            **Note**: This is a plan preview. Actual deployment requires manual approval and secrets.
            
            ---
            *Generated by GitHub Actions*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ==============================================================================
  # Policy as Code Check (Optional - using Checkov)
  # ==============================================================================
  checkov-scan:
    name: Infrastructure Policy Check (Checkov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov scan
        run: |
          pip install checkov
          checkov -d terraform/ --framework terraform --output cli || true

  # ==============================================================================
  # Generate Terraform Documentation
  # ==============================================================================
  terraform-docs:
    name: Generate Terraform Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install terraform-docs
        run: |
          wget -qO terraform-docs https://github.com/terraform-docs/terraform-docs/releases/download/v0.17.0/terraform-docs-v0.17.0-linux-amd64
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: Generate Terraform documentation
        run: |
          cd terraform
          terraform-docs markdown . > README.md
          cat README.md

  # ==============================================================================
  # Secrets Validation
  # ==============================================================================
  secrets-validation:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for required secrets
        run: |
          echo "Checking for required secrets configuration..."
          echo "Required: RENDER_API_KEY"
          echo "See: https://github.com/${{ github.repository }}/settings/secrets/actions"
