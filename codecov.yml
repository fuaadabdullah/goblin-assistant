coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 70%
        threshold: 5%

flags:
  backend:
    paths:
      - apps/api/src/
    carryforward: true
  frontend:
    paths:
      - apps/web/src/
    carryforward: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
