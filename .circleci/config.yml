version: 2.1

# No orbs — uses only official Docker images and shell steps.
# Orb security settings can be enabled later in CircleCI Org Settings → Security.

parameters:
  run_e2e_tests:
    type: boolean
    default: false

executors:
  node:
    docker:
      - image: cimg/node:20.9
    working_directory: ~/repo
    resource_class: medium

  python:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/repo
    resource_class: medium

  node-python:
    docker:
      - image: cimg/python:3.11-node
    working_directory: ~/repo
    resource_class: medium

  base:
    docker:
      - image: cimg/base:current
    working_directory: ~/repo
    resource_class: medium

commands:
  setup-tmpdir:
    steps:
      - run:
          name: Create .tmp directory
          command: mkdir -p ~/repo/.tmp

  install-pnpm:
    steps:
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm@9
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install Node deps
          command: TMPDIR=~/repo/.tmp pnpm install --frozen-lockfile=false
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store

  install-python:
    steps:
      - restore_cache:
          keys:
            - pip-v1-{{ checksum "apps/api/requirements.txt" }}-{{ checksum "apps/api/requirements-vector.txt" }}
            - pip-v1-
      - run:
          name: Install Python deps
          command: |
            pip install --upgrade pip
            pip install -r apps/api/requirements.txt -r apps/api/requirements-vector.txt
      - save_cache:
          key: pip-v1-{{ checksum "apps/api/requirements.txt" }}-{{ checksum "apps/api/requirements-vector.txt" }}
          paths:
            - ~/.cache/pip

jobs:
  # ── Policy ───────────────────────────────────────────────────────────────
  policy:
    executor: base
    steps:
      - checkout
      - run:
          name: Branch + commit policy
          command: bash tooling/automation/ci-policy-check.sh

  # ── Format ───────────────────────────────────────────────────────────────
  format-check:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Ruff format check
          command: cd apps/api && PYTHONPATH=src python -m ruff format --check src/api
      - run:
          name: Prettier check
          command: TMPDIR=~/repo/.tmp pnpm --filter @goblin/web exec prettier --check apps/web

  # ── Security ─────────────────────────────────────────────────────────────
  security-scan:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - run:
          name: Install pip-audit
          command: pip install pip-audit
      - run:
          name: Secret scan
          command: python scripts/security/scan_secrets.py
      - run:
          name: Audit npm deps
          command: npx audit-ci --config audit-ci.json
      - run:
          name: Audit Python deps
          command: python -m pip_audit -r apps/api/requirements.txt

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Lint (ruff + eslint + policy guard)
          command: make lint

  # ── Type check ───────────────────────────────────────────────────────────
  typecheck:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Install pyright
          command: pip install pyright
      - run:
          name: TypeScript
          command: TMPDIR=~/repo/.tmp pnpm --filter @goblin/web type-check
      - run:
          name: mypy
          command: make type-check-api-mypy
      - run:
          name: pyright
          command: make type-check-api-pyright
      - run:
          name: Route lifecycle policy
          command: make check-route-lifecycle
      - run:
          name: SDK artifacts current
          command: make sdk-check

  # ── Backend tests ─────────────────────────────────────────────────────────
  test-backend:
    executor: python
    steps:
      - checkout
      - setup-tmpdir
      - install-python
      - run:
          name: pytest with coverage
          command: |
            pip install pytest-cov
            cd apps/api
            PYTHONPATH=src python -m pytest \
              -o "addopts=" \
              --cov=src/api \
              --cov-report=xml:coverage.xml \
              --cov-report=html:htmlcov \
              --junitxml=test-results.xml \
              --tb=short -v
      - store_test_results:
          path: apps/api/test-results.xml
      - store_artifacts:
          path: apps/api/htmlcov
          destination: coverage-html
      - run:
          name: Upload to Codecov
          command: |
            if [ -z "$CODECOV_TOKEN" ]; then
              echo "Warning: CODECOV_TOKEN not set, skipping Codecov upload"
              exit 0
            fi
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov -t "${CODECOV_TOKEN}" -f apps/api/coverage.xml -F backend

  # ── Frontend tests ────────────────────────────────────────────────────────
  test-frontend:
    executor: node
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - run:
          name: Web tests
          command: TMPDIR=~/repo/.tmp pnpm --filter @goblin/web test:ci
      - store_artifacts:
          path: apps/web/coverage
          destination: web-coverage

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    executor: node-python
    steps:
      - checkout
      - setup-tmpdir
      - install-pnpm
      - install-python
      - run:
          name: Next.js production build
          command: TMPDIR=~/repo/.tmp make build
      - store_artifacts:
          path: apps/web/.next
          destination: next-build

  # ── Docker ────────────────────────────────────────────────────────────────
  docker-build:
    executor: base
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Validate Docker credentials
          command: |
            if [ -z "$GITHUB_USER" ] || [ -z "$GITHUB_TOKEN" ]; then
              echo "Error: GITHUB_USER or GITHUB_TOKEN not set"
              echo "Set these in CircleCI project settings → Environment Variables"
              exit 1
            fi
      - run:
          name: Build and push Docker image
          command: |
            SHORT="${CIRCLE_SHA1:0:7}"
            TAG="ghcr.io/${GITHUB_USER}/goblin-assistant:${CIRCLE_BRANCH}-${SHORT}"
            docker build -t "$TAG" -t "ghcr.io/${GITHUB_USER}/goblin-assistant:latest" -f Dockerfile .
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_USER" --password-stdin
            docker push "$TAG"
            docker push "ghcr.io/${GITHUB_USER}/goblin-assistant:latest"

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy-render:
    executor: base
    steps:
      - run:
          name: Validate Render credentials
          command: |
            if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ]; then
              echo "Error: RENDER_SERVICE_ID or RENDER_API_KEY not set"
              echo "Set these in CircleCI project settings → Environment Variables"
              exit 1
            fi
      - run:
          name: Trigger Render deploy
          command: |
            curl -sf -X POST \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear_cache"}'
      - run:
          name: Wait for health check
          command: |
            sleep 60
            for i in $(seq 1 20); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                https://goblin-backend-dt30.onrender.com/health || echo "000")
              [ "$STATUS" = "200" ] && echo "Healthy after $i attempts." && exit 0
              echo "Attempt $i: $STATUS — retrying in 15s"
              sleep 15
            done
            echo "Health check timed out." && exit 1

  # ── Smoke Tests ──────────────────────────────────────────────────────────
  smoke-test:
    executor: base
    steps:
      - run:
          name: Health check (staging)
          command: |
            for i in $(seq 1 5); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                https://goblin-backend-dt30.onrender.com/health || echo "000")
              [ "$STATUS" = "200" ] && echo "Health check passed." && break
              echo "Attempt $i: $STATUS — retrying in 10s"
              sleep 10
              [ "$i" = "5" ] && echo "Health check failed after 5 attempts." && exit 1
            done
      - run:
          name: Readiness check (staging)
          command: |
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              https://goblin-backend-dt30.onrender.com/health/ready || echo "000")
            [ "$STATUS" = "200" ] && echo "Readiness check passed." && exit 0
            echo "Readiness check returned $STATUS." && exit 1

workflows:
  ci:
    jobs:
      - policy
      - format-check:
          requires: [policy]
      - security-scan:
          requires: [policy]
      - lint:
          requires: [format-check, security-scan]
      - typecheck:
          requires: [format-check, security-scan]
      - test-backend:
          requires: [lint, typecheck]
      - test-frontend:
          requires: [lint, typecheck]
      - build:
          requires: [test-backend, test-frontend]
      - docker-build:
          requires: [build]
          filters:
            branches:
              only: [main, develop]
      - deploy-render:
          requires: [docker-build]
          filters:
            branches:
              only: main

  nightly:
    triggers:
      - schedule:
          cron: "0 3 * * *"
          filters:
            branches:
              only: main
    jobs:
      - test-backend
      - test-frontend
      - build
      - smoke-test
