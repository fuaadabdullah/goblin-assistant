# ---------------------------------------------------------------------------
# OpenAI
# ---------------------------------------------------------------------------
[providers.openai]
name                    = "OpenAI"
endpoint                = "https://api.openai.com/v1"
endpoint_env            = "OPENAI_ENDPOINT"
invoke_path             = "/chat/completions"
api_key_env             = "OPENAI_API_KEY"
default_model           = "gpt-4o-mini"
models                  = ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]
capabilities            = ["chat", "reasoning", "code", "embedding", "image"]
priority_tier           = 30
cost_score              = 0.75
cost_input_per1k        = 0.0025
cost_output_per1k       = 0.01
default_timeout_ms      = 10000
bandwidth_score         = 0.9
rate_limit_per_min      = 60
supports_cot            = true
cot_suppression_prompt  = "Answer directly without showing your reasoning."
tier                    = "cloud"
display_name            = "OpenAI"
is_active               = true

[providers.openai.costs]
default                   = { input_per1k = 0.005, output_per1k = 0.015 }
"gpt-4o"                  = { input_per1k = 0.005, output_per1k = 0.015 }
"gpt-4o-mini"             = { input_per1k = 0.00015, output_per1k = 0.0006 }
"gpt-4-turbo"             = { input_per1k = 0.01, output_per1k = 0.03 }
"o1"                      = { input_per1k = 0.015, output_per1k = 0.06 }
"o1-mini"                 = { input_per1k = 0.003, output_per1k = 0.012 }
"o3-mini"                 = { input_per1k = 0.0011, output_per1k = 0.0044 }

[providers.openai.rate_limits]
default                   = { requests_per_minute = 60, tokens_per_minute = 200000, concurrency = 0 }
"gpt-4o"                  = { requests_per_minute = 500, tokens_per_minute = 200000, concurrency = 0 }
