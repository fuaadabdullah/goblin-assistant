---
# Production Ingress with TLS and security headers
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-api-ingress
  namespace: sandbox
  annotations:
    # TLS configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Rate limiting
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/rate-limit-burst: "20"

    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://yourapp.yourdomain.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key"

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - sandbox.yourdomain.com
    secretName: sandbox-tls-cert
  rules:
  - host: sandbox.yourdomain.com
    http:
      paths:
      - path: /api/v1/sandbox
        pathType: Prefix
        backend:
          service:
            name: goblin-assistant-api
            port:
              number: 8001
      - path: /health
        pathType: Exact
        backend:
          service:
            name: goblin-assistant-api
            port:
              number: 8001

---
# MinIO Console Ingress (admin access only)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console-ingress
  namespace: sandbox
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: minio-admin-creds
    nginx.ingress.kubernetes.io/auth-realm: 'MinIO Console'
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - minio.sandbox.yourdomain.com
    secretName: minio-console-tls-cert
  rules:
  - host: minio.sandbox.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: minio-service
            port:
              number: 9001

---
# Basic auth secret for MinIO console
apiVersion: v1
kind: Secret
metadata:
  name: minio-admin-creds
  namespace: sandbox
type: Opaque
data:
  # Generate with: htpasswd -nb admin YourSecurePassword | base64 -w 0
  auth: "YWRtaW46JGFwcjEkaDc0R0xXTVAkVzMuSGV5V0xqRUlzU3pHekJ5QU1LLwo="  # admin:SecureMinIOPassword123!