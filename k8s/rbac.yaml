---
# Service Account for API pods (minimal permissions)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-api-sa
  namespace: sandbox
  labels:
    app: goblin-assistant-api
    component: api

---
# Service Account for Worker pods (Docker access)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-worker-sa
  namespace: sandbox
  labels:
    app: goblin-assistant-worker
    component: worker

---
# Role for API Service Account (minimal read access)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-api-role
  namespace: sandbox
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["sandbox-secrets"]
  verbs: ["get"]

---
# Role for Worker Service Account (Docker access)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-worker-role
  namespace: sandbox
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "create", "delete"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["sandbox-secrets", "cosign-public-key"]
  verbs: ["get"]

---
# RoleBindings
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-api-binding
  namespace: sandbox
subjects:
- kind: ServiceAccount
  name: sandbox-api-sa
  namespace: sandbox
roleRef:
  kind: Role
  name: sandbox-api-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-worker-binding
  namespace: sandbox
subjects:
- kind: ServiceAccount
  name: sandbox-worker-sa
  namespace: sandbox
roleRef:
  kind: Role
  name: sandbox-worker-role
  apiGroup: rbac.authorization.k8s.io